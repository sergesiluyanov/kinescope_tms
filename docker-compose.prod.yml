# Боевая (prod) конфигурация. Отличия от docker-compose.yml:
#   * фронт собирается в статику и отдаётся через nginx на :80,
#     /api/ проксируется на сервис api в той же docker-сети
#   * api не публикует порт наружу — доступ к нему только через nginx
#   * postgres не публикует порт наружу — только внутри docker-сети
#   * restart: always для всех сервисов
#
# Запуск:   docker compose -f docker-compose.prod.yml up -d --build
# Логи:     docker compose -f docker-compose.prod.yml logs -f
# Стоп:     docker compose -f docker-compose.prod.yml down
#
# Файл самодостаточный — base docker-compose.yml не нужен.

services:
  postgres:
    image: postgres:16-alpine
    container_name: tms-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kinescope_tms}
      POSTGRES_USER: ${POSTGRES_USER:-tms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tms}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tms} -d ${POSTGRES_DB:-kinescope_tms}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    container_name: tms-api
    restart: always
    env_file:
      - .env
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tms}:${POSTGRES_PASSWORD:-tms}@postgres:5432/${POSTGRES_DB:-kinescope_tms}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./frontend
      target: prod
    container_name: tms-web
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
